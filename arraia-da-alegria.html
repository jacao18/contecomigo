<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<title>Arraiá da Alegria</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Rye&family=Pacifico&family=Cabin+Sketch:wght@400;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    /* Tema padrão: Arraiá Quente — sobrescrito pelo editor via <style> injetado */
    --accent: #FFC93C;
    --sky-top: #1b1140;
    --sky-mid: #3a1d5e;
    --sky-mid2: #7a2d52;
    --sky-bot: #c64b3b;
    --frame-color: rgba(255,201,60,0.6);
    --flag-1: #ff5252;
    --flag-2: #ffc93c;
    --flag-3: #4caf50;
    --flag-4: #42a5f5;
    --flag-5: #ff8f3c;
    --fire-color: #ff7b29;
    --tag-color: #ffe08a;
    --weekday-color: #ffd166;
    --addr-color: rgba(255,230,190,0.85);
    --gem-color: #ffd166;
  }
  html, body {
    margin: 0; padding: 0;
    min-height: 100%;
    background: #0e0a22;
    font-family: 'Inter', sans-serif;
    color: #fff;
    -webkit-font-smoothing: antialiased;
  }
  body {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    box-sizing: border-box;
  }

  .invite-card {
    position: relative;
    width: 100%;
    max-width: 460px;
    aspect-ratio: 9 / 16;
    border-radius: 22px;
    overflow: hidden;
    box-shadow:
      0 30px 80px -20px rgba(220, 90, 40, 0.5),
      0 10px 30px -10px rgba(0, 0, 0, 0.6),
      inset 0 0 0 1px rgba(255, 201, 60, 0.25);
    isolation: isolate;
  }

  /* Sky gradient */
  .sky {
    position: absolute; inset: 0;
    background:
      radial-gradient(ellipse 70% 40% at 50% 18%, rgba(255, 210, 130, 0.25), transparent 60%),
      radial-gradient(ellipse 80% 50% at 25% 78%, rgba(255, 140, 60, 0.30), transparent 60%),
      radial-gradient(ellipse 80% 50% at 80% 88%, rgba(255, 90, 60, 0.30), transparent 60%),
      linear-gradient(180deg, var(--sky-top) 0%, var(--sky-mid) 32%, var(--sky-mid2) 62%, var(--sky-bot) 100%);
    z-index: 0;
  }

  /* Starfield */
  .stars { position: absolute; inset: 0; pointer-events: none; z-index: 1; }
  .star {
    position: absolute;
    width: 2px; height: 2px;
    background: #fff;
    border-radius: 50%;
    box-shadow: 0 0 4px #fff;
    animation: twinkle var(--d, 3s) ease-in-out infinite;
    animation-delay: var(--dl, 0s);
  }
  .star.big { width: 6px; height: 6px; background: transparent; }
  .star.big::before, .star.big::after {
    content: '';
    position: absolute;
    left: 50%; top: 50%;
    transform: translate(-50%, -50%);
    background: radial-gradient(circle, #fff3c4 0%, #ffd166 30%, transparent 70%);
    border-radius: 50%;
  }
  .star.big::before { width: 14px; height: 14px; }
  .star.big::after { width: 6px; height: 6px; background: #fff; box-shadow: 0 0 10px #fff, 0 0 20px #ffd166; }
  @keyframes twinkle {
    0%, 100% { opacity: 0.3; transform: scale(0.8); }
    50% { opacity: 1; transform: scale(1.2); }
  }

  /* Moon */
  .moon {
    position: absolute;
    top: 7%; right: 13%;
    width: 50px; height: 50px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, #fff8e4, #ffe0a0 60%, #d99a4a 100%);
    box-shadow: 0 0 30px rgba(255, 215, 140, 0.6), 0 0 60px rgba(255, 160, 90, 0.3);
    z-index: 2;
  }

  /* Bunting flags (bandeirinhas) */
  .bunting {
    position: absolute;
    left: -2%; right: -2%;
    z-index: 9;
    pointer-events: none;
  }
  .bunting svg { width: 100%; display: block; }
  .bunting.row1 { top: 22%; }
  .bunting.row2 { top: 28%; }
  .flag-sway { transform-origin: top center; animation: sway 4s ease-in-out infinite; }
  @keyframes sway {
    0%, 100% { transform: rotate(-1.5deg); }
    50% { transform: rotate(1.5deg); }
  }

  /* Hills */
  .hills {
    position: absolute;
    left: 0; right: 0; bottom: 0;
    height: 48%;
    z-index: 3;
  }
  .hills svg { width: 100%; height: 100%; display: block; }

  /* Bonfire (fogueira) */
  .bonfire {
    position: absolute;
    left: 50%;
    bottom: 22%;
    transform: translateX(-50%);
    width: 30%;
    z-index: 4;
    filter: drop-shadow(0 0 26px rgba(255, 140, 40, 0.6));
  }
  .bonfire svg { width: 100%; display: block; }
  .flame {
    transform-origin: center bottom;
    animation: flicker 0.9s ease-in-out infinite alternate;
  }
  .flame.f2 { animation-duration: 1.2s; animation-delay: 0.2s; }
  .flame.f3 { animation-duration: 0.7s; animation-delay: 0.1s; }
  @keyframes flicker {
    0% { transform: scaleY(0.92) scaleX(1.03) translateY(2px); opacity: 0.9; }
    100% { transform: scaleY(1.08) scaleX(0.96) translateY(0); opacity: 1; }
  }
  .fire-glow {
    position: absolute;
    left: 50%;
    bottom: 20%;
    transform: translateX(-50%);
    width: 180px; height: 180px;
    background: radial-gradient(circle, rgba(255,140,40,0.35) 0%, transparent 65%);
    z-index: 3;
    pointer-events: none;
    animation: glowpulse 2.4s ease-in-out infinite;
  }
  @keyframes glowpulse {
    0%, 100% { opacity: 0.7; transform: translateX(-50%) scale(1); }
    50% { opacity: 1; transform: translateX(-50%) scale(1.08); }
  }

  /* Hot-air balloon (balão junino) */
  .balloon {
    position: absolute;
    z-index: 4;
    animation: float 7s ease-in-out infinite;
  }
  .balloon svg { width: 100%; display: block; }
  .balloon.b1 { left: 12%; top: 30%; width: 46px; animation-delay: 0s; }
  .balloon.b2 { right: 10%; top: 38%; width: 36px; animation-delay: 2.5s; }
  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-14px); }
  }

  /* Ornamental frame */
  .ornament-frame {
    position: absolute;
    inset: 14px;
    border-radius: 16px;
    border: 1.5px dashed var(--frame-color);
    z-index: 10;
    pointer-events: none;
  }
  .corner {
    position: absolute;
    width: 30px; height: 30px;
    z-index: 11;
    pointer-events: none;
  }
  .corner svg { width: 100%; height: 100%; display: block; }
  .corner.tl { top: 9px; left: 9px; }
  .corner.tr { top: 9px; right: 9px; transform: scaleX(-1); }
  .corner.bl { bottom: 9px; left: 9px; transform: scaleY(-1); }
  .corner.br { bottom: 9px; right: 9px; transform: scale(-1, -1); }

  /* Content */
  .content {
    position: absolute;
    inset: 0;
    z-index: 6;
    display: flex;
    flex-direction: column;
    padding: 30px 32px;
    box-sizing: border-box;
  }

  .age-banner {
    align-self: center;
    margin-top: 20px;
    padding: 7px 24px;
    background: linear-gradient(180deg, #ffe08a 0%, var(--accent) 55%, #c98a1a 100%);
    color: #7a2400;
    font-family: 'Rye', serif;
    font-weight: 400;
    font-size: 13px;
    letter-spacing: 0.12em;
    border-radius: 999px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.35), inset 0 1px 0 rgba(255,255,255,0.5);
    position: relative;
    z-index: 7;
  }
  .age-banner::before, .age-banner::after {
    content: '✶';
    color: #7a2400;
    margin: 0 8px;
    font-size: 11px;
  }

  .title-tag {
    align-self: center;
    margin-top: 14px;
    font-family: 'Cabin Sketch', cursive;
    font-weight: 700;
    font-size: 13px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--tag-color);
    text-align: center;
  }

  .name-block {
    margin-top: auto;
    margin-bottom: 10px;
    text-align: center;
  }
  .tag {
    font-family: 'Cabin Sketch', cursive;
    font-weight: 700;
    font-size: 12px;
    letter-spacing: 0.3em;
    color: var(--tag-color);
    text-transform: uppercase;
    margin-bottom: 2px;
  }
  .name {
    font-family: 'Pacifico', cursive;
    font-size: 58px;
    line-height: 1.0;
    color: #fff;
    text-shadow:
      0 0 20px rgba(255, 180, 80, 0.7),
      0 0 40px rgba(255, 120, 60, 0.4),
      0 2px 6px rgba(0,0,0,0.5);
    margin: 0;
    padding: 0 8px;
  }

  .divider {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    margin: 10px 0 4px;
    opacity: 0.9;
  }
  .divider .line {
    width: 34px; height: 1px;
    background: linear-gradient(90deg, transparent, var(--gem-color), transparent);
  }
  .divider .gem {
    color: var(--gem-color);
    font-size: 12px;
    text-shadow: 0 0 8px var(--gem-color);
  }

  .date-row {
    display: flex;
    justify-content: center;
    gap: 12px;
    margin-top: 12px;
    margin-bottom: 8px;
  }
  .date-pill {
    background: rgba(255, 255, 255, 0.08);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    border: 1px solid rgba(255, 201, 60, 0.45);
    border-radius: 12px;
    padding: 10px 14px;
    text-align: center;
    min-width: 68px;
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.1);
  }
  .date-pill .label {
    font-family: 'Cabin Sketch', cursive;
    font-weight: 700;
    font-size: 9.5px;
    letter-spacing: 0.2em;
    color: var(--weekday-color);
    text-transform: uppercase;
  }
  .date-pill .value {
    font-family: 'Rye', serif;
    font-size: 20px;
    font-weight: 400;
    color: #fff;
    margin-top: 3px;
  }

  .info {
    text-align: center;
    font-family: 'Inter', sans-serif;
    color: rgba(255,255,255,0.9);
    line-height: 1.5;
    margin-top: 6px;
    padding: 0 16px;
  }
  .info .weekday {
    font-family: 'Cabin Sketch', cursive;
    font-weight: 700;
    font-size: 12px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--weekday-color);
    margin-bottom: 4px;
  }
  .info .venue {
    font-weight: 600;
    letter-spacing: 0.02em;
    font-size: 15px;
    color: #fff;
  }
  .info .addr {
    font-size: 11.5px;
    color: var(--addr-color);
    margin-top: 2px;
    font-style: italic;
  }
  .info .dress {
    font-size: 11px;
    color: var(--tag-color);
    margin-top: 7px;
    letter-spacing: 0.04em;
  }
  .info .dress .lbl {
    font-family: 'Cabin Sketch', cursive;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.16em;
    margin-right: 4px;
  }
  .info .msg {
    font-size: 12px;
    color: rgba(255,255,255,0.78);
    margin-top: 8px;
    font-style: italic;
    line-height: 1.45;
  }

  .brand {
    position: absolute;
    bottom: 10px; left: 0; right: 0;
    text-align: center;
    font-family: 'Cabin Sketch', cursive;
    font-weight: 700;
    font-size: 9px;
    letter-spacing: 0.3em;
    color: rgba(255, 201, 60, 0.55);
    z-index: 8;
  }

  /* Embers / sparks rising from fire */
  .embers {
    position: absolute; inset: 0;
    z-index: 5;
    pointer-events: none;
    overflow: hidden;
  }
  .ember {
    position: absolute;
    bottom: 22%;
    width: 4px; height: 4px;
    background: radial-gradient(circle, #fff 0%, var(--fire-color) 45%, transparent 70%);
    border-radius: 50%;
    box-shadow: 0 0 6px var(--fire-color);
    animation: rise linear infinite;
  }
  @keyframes rise {
    0% { transform: translateY(0) translateX(0) scale(0.5); opacity: 0; }
    15% { opacity: 1; }
    85% { opacity: 1; }
    100% { transform: translateY(-380px) translateX(var(--drift, 20px)) scale(0.9); opacity: 0; }
  }
</style>
</head>
<body>

<div class="invite-card">
  <div class="sky"></div>
  <div class="stars" id="stars"></div>
  <div class="moon"></div>

  <!-- Bandeirinhas -->
  <div class="bunting row1">
    <svg viewBox="0 0 460 46" preserveAspectRatio="none">
      <path class="flag-sway" d="M0,8 Q230,34 460,8" fill="none" stroke="rgba(255,255,255,0.55)" stroke-width="1.5"/>
      <g class="flag-sway">
        <polygon points="10,9 38,15 24,40" fill="var(--flag-1)"/>
        <polygon points="48,12 76,17 62,42" fill="var(--flag-2)"/>
        <polygon points="86,14 114,19 100,44" fill="var(--flag-3)"/>
        <polygon points="124,16 152,20 138,45" fill="var(--flag-4)"/>
        <polygon points="162,17 190,21 176,46" fill="var(--flag-5)"/>
        <polygon points="200,18 228,21 214,46" fill="var(--flag-1)"/>
        <polygon points="238,18 266,21 252,46" fill="var(--flag-2)"/>
        <polygon points="276,17 304,21 290,46" fill="var(--flag-3)"/>
        <polygon points="314,16 342,20 328,45" fill="var(--flag-4)"/>
        <polygon points="352,14 380,19 366,44" fill="var(--flag-5)"/>
        <polygon points="390,12 418,17 404,42" fill="var(--flag-1)"/>
        <polygon points="428,9 456,15 442,40" fill="var(--flag-2)"/>
      </g>
    </svg>
  </div>
  <div class="bunting row2">
    <svg viewBox="0 0 460 46" preserveAspectRatio="none">
      <path class="flag-sway" d="M0,6 Q230,30 460,6" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="1.5"/>
      <g class="flag-sway">
        <polygon points="30,8 58,13 44,38" fill="var(--flag-3)"/>
        <polygon points="68,11 96,15 82,40" fill="var(--flag-5)"/>
        <polygon points="106,12 134,16 120,42" fill="var(--flag-2)"/>
        <polygon points="144,14 172,18 158,43" fill="var(--flag-1)"/>
        <polygon points="182,15 210,18 196,44" fill="var(--flag-4)"/>
        <polygon points="220,15 248,18 234,44" fill="var(--flag-3)"/>
        <polygon points="258,14 286,18 272,43" fill="var(--flag-5)"/>
        <polygon points="296,12 324,16 310,42" fill="var(--flag-2)"/>
        <polygon points="334,11 362,15 348,40" fill="var(--flag-1)"/>
        <polygon points="372,8 400,13 386,38" fill="var(--flag-4)"/>
      </g>
    </svg>
  </div>

  <!-- Balões juninos -->
  <div class="balloon b1">
    <svg viewBox="0 0 60 90">
      <path d="M30 2 C8 2 2 26 2 38 C2 54 18 64 30 70 C42 64 58 54 58 38 C58 26 52 2 30 2 Z" fill="var(--flag-1)"/>
      <path d="M30 2 C22 2 18 18 18 38 C18 54 24 64 30 70 C36 64 42 54 42 38 C42 18 38 2 30 2 Z" fill="var(--flag-2)" opacity="0.85"/>
      <path d="M30 2 C26 2 24 22 24 40 C24 56 28 65 30 70 C32 65 36 56 36 40 C36 22 34 2 30 2 Z" fill="var(--flag-3)" opacity="0.85"/>
      <path d="M24 70 L36 70 L33 78 L27 78 Z" fill="#c98a1a"/>
      <line x1="27" y1="78" x2="25" y2="88" stroke="rgba(255,255,255,0.5)" stroke-width="0.8"/>
      <line x1="33" y1="78" x2="35" y2="88" stroke="rgba(255,255,255,0.5)" stroke-width="0.8"/>
      <rect x="24" y="86" width="12" height="4" rx="1" fill="#8a5a2a"/>
    </svg>
  </div>
  <div class="balloon b2">
    <svg viewBox="0 0 60 90">
      <path d="M30 2 C8 2 2 26 2 38 C2 54 18 64 30 70 C42 64 58 54 58 38 C58 26 52 2 30 2 Z" fill="var(--flag-4)"/>
      <path d="M30 2 C22 2 18 18 18 38 C18 54 24 64 30 70 C36 64 42 54 42 38 C42 18 38 2 30 2 Z" fill="var(--flag-5)" opacity="0.85"/>
      <path d="M30 2 C26 2 24 22 24 40 C24 56 28 65 30 70 C32 65 36 56 36 40 C36 22 34 2 30 2 Z" fill="var(--flag-2)" opacity="0.85"/>
      <path d="M24 70 L36 70 L33 78 L27 78 Z" fill="#c98a1a"/>
      <line x1="27" y1="78" x2="25" y2="88" stroke="rgba(255,255,255,0.5)" stroke-width="0.8"/>
      <line x1="33" y1="78" x2="35" y2="88" stroke="rgba(255,255,255,0.5)" stroke-width="0.8"/>
      <rect x="24" y="86" width="12" height="4" rx="1" fill="#8a5a2a"/>
    </svg>
  </div>

  <!-- Colinas -->
  <div class="hills">
    <svg viewBox="0 0 460 300" preserveAspectRatio="none">
      <defs>
        <linearGradient id="hillA" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#5a2e1a"/>
          <stop offset="100%" stop-color="#2e1610"/>
        </linearGradient>
        <linearGradient id="hillB" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#3a1c12"/>
          <stop offset="100%" stop-color="#160a08"/>
        </linearGradient>
      </defs>
      <path d="M0,170 Q115,120 230,165 Q345,210 460,160 L460,300 L0,300 Z" fill="url(#hillA)" opacity="0.9"/>
      <path d="M0,225 Q140,185 280,220 Q380,245 460,210 L460,300 L0,300 Z" fill="url(#hillB)"/>
      <rect x="0" y="265" width="460" height="40" fill="#0a0504" opacity="0.7"/>
    </svg>
  </div>

  <!-- Fogueira -->
  <div class="fire-glow"></div>
  <div class="bonfire">
    <svg viewBox="0 0 120 140">
      <!-- Lenha -->
      <g>
        <rect x="22" y="106" width="76" height="11" rx="4" fill="#5a3418" transform="rotate(8 60 111)"/>
        <rect x="22" y="106" width="76" height="11" rx="4" fill="#6e4220" transform="rotate(-8 60 111)"/>
        <rect x="30" y="116" width="60" height="9" rx="4" fill="#4a2a12"/>
        <circle cx="26" cy="111" r="3" fill="#3a2010"/>
        <circle cx="94" cy="111" r="3" fill="#3a2010"/>
      </g>
      <!-- Chamas -->
      <path class="flame f3" d="M60 110 C44 92 50 70 58 54 C56 72 70 74 66 92 C78 80 76 60 70 46 C86 64 84 96 60 110 Z" fill="#ffd166"/>
      <path class="flame f2" d="M60 110 C48 94 52 74 60 58 C58 76 70 78 66 94 C76 84 74 66 68 54 C82 72 80 98 60 110 Z" fill="var(--fire-color)"/>
      <path class="flame" d="M60 110 C52 98 54 82 60 70 C59 84 67 86 64 98 C71 90 70 78 66 70 C76 84 74 100 60 110 Z" fill="#ffe08a"/>
    </svg>
  </div>

  <!-- Embers -->
  <div class="embers" id="embers"></div>

  <!-- Ornamental frame -->
  <div class="ornament-frame"></div>
  <div class="corner tl"><svg viewBox="0 0 40 40" fill="none" stroke="rgba(255,201,60,0.85)" stroke-width="1.4" stroke-linecap="round"><path d="M 4 20 Q 4 4 20 4"/><path d="M 9 20 Q 9 9 20 9" opacity="0.6"/><path d="M14 6 l2 4 l4 -1 l-3 3 l2 4 l-4 -2 l-3 3 l0 -4 l-4 -1 l4 -2 z" fill="rgba(255,201,60,0.9)" stroke="none"/></svg></div>
  <div class="corner tr"><svg viewBox="0 0 40 40" fill="none" stroke="rgba(255,201,60,0.85)" stroke-width="1.4" stroke-linecap="round"><path d="M 4 20 Q 4 4 20 4"/><path d="M 9 20 Q 9 9 20 9" opacity="0.6"/><path d="M14 6 l2 4 l4 -1 l-3 3 l2 4 l-4 -2 l-3 3 l0 -4 l-4 -1 l4 -2 z" fill="rgba(255,201,60,0.9)" stroke="none"/></svg></div>
  <div class="corner bl"><svg viewBox="0 0 40 40" fill="none" stroke="rgba(255,201,60,0.85)" stroke-width="1.4" stroke-linecap="round"><path d="M 4 20 Q 4 4 20 4"/><path d="M 9 20 Q 9 9 20 9" opacity="0.6"/><path d="M14 6 l2 4 l4 -1 l-3 3 l2 4 l-4 -2 l-3 3 l0 -4 l-4 -1 l4 -2 z" fill="rgba(255,201,60,0.9)" stroke="none"/></svg></div>
  <div class="corner br"><svg viewBox="0 0 40 40" fill="none" stroke="rgba(255,201,60,0.85)" stroke-width="1.4" stroke-linecap="round"><path d="M 4 20 Q 4 4 20 4"/><path d="M 9 20 Q 9 9 20 9" opacity="0.6"/><path d="M14 6 l2 4 l4 -1 l-3 3 l2 4 l-4 -2 l-3 3 l0 -4 l-4 -1 l4 -2 z" fill="rgba(255,201,60,0.9)" stroke="none"/></svg></div>

  <!-- Content — valores injetados via {{placeholders}} pelo sistema ConteComigo -->
  <div class="content">
    <div class="age-banner" id="ageBanner">{{idade}}</div>

    <div class="title-tag" id="titleEl">{{titulo}}</div>

    <div class="name-block">
      <div class="tag">É chegada a hora do</div>
      <h1 class="name" id="nameEl">{{nome}}</h1>
    </div>

    <div class="divider">
      <span class="line"></span>
      <span class="gem">✶</span>
      <span class="line"></span>
    </div>

    <div class="date-row">
      <div class="date-pill">
        <div class="label">Dia</div>
        <div class="value" id="diaEl">{{dia}}</div>
      </div>
      <div class="date-pill">
        <div class="label">Mês</div>
        <div class="value" id="mesEl">{{mes}}</div>
      </div>
      <div class="date-pill">
        <div class="label">Hora</div>
        <div class="value" id="horaEl">{{hora}}</div>
      </div>
    </div>

    <div class="info">
      <div class="weekday" id="weekdayEl">{{diaSemana}}</div>
      <div class="venue" id="venueEl">{{local}}</div>
      <div class="addr" id="addrEl">{{endereco}}</div>
      <div class="dress"><span class="lbl">Traje</span>{{dress}}</div>
      <div class="msg" id="msgEl">{{msg}}</div>
    </div>

    <div class="brand">✶ CONTE COMIGO ✶</div>
  </div>
</div>

<script>
  // ── Cálculo automático do dia da semana ─────────────────────────────
  (function() {
    const weekdayEl = document.getElementById('weekdayEl');
    if (!weekdayEl) return;
    const text = weekdayEl.textContent.trim();
    if (text === '{{diaSemana}}' || text === '') {
      const diaEl  = document.getElementById('diaEl');
      const mesEl  = document.getElementById('mesEl');
      const dia    = diaEl  ? parseInt(diaEl.textContent.trim(), 10)  : null;
      const mesStr = mesEl  ? mesEl.textContent.trim().toLowerCase()  : null;
      const meses = {
        'janeiro':1,'fevereiro':2,'março':3,'marco':3,'abril':4,'maio':5,'junho':6,
        'julho':7,'agosto':8,'setembro':9,'outubro':10,'novembro':11,'dezembro':12
      };
      const mesNum = meses[mesStr];
      if (dia && mesNum) {
        const year = new Date().getFullYear();
        const d = new Date(year, mesNum - 1, dia);
        if (d < new Date()) d.setFullYear(year + 1);
        const nomes = ['Domingo','Segunda-feira','Terça-feira','Quarta-feira','Quinta-feira','Sexta-feira','Sábado'];
        weekdayEl.textContent = nomes[d.getDay()];
      }
    }
    if (weekdayEl.textContent.length > 0 && weekdayEl.textContent.indexOf('{{') === -1) {
      weekdayEl.textContent = weekdayEl.textContent.charAt(0).toUpperCase()
        + weekdayEl.textContent.slice(1);
    }
  })();

  // ── Starfield ────────────────────────────────────────────────────────
  (function() {
    const host = document.getElementById('stars');
    if (!host) return;
    const count = 60;
    let html = '';
    for (let i = 0; i < count; i++) {
      const x  = Math.random() * 100;
      const y  = Math.random() * 55;
      const d  = 2 + Math.random() * 3;
      const dl = Math.random() * 3;
      const big = Math.random() < 0.08;
      html += '<div class="star' + (big ? ' big' : '') + '" style="left:' + x + '%;top:' + y + '%;--d:' + d + 's;--dl:' + dl + 's"></div>';
    }
    host.innerHTML = html;
  })();

  // ── Embers (faíscas da fogueira) ─────────────────────────────────────
  (function() {
    const host = document.getElementById('embers');
    if (!host) return;
    const count = 26;
    let html = '';
    for (let i = 0; i < count; i++) {
      const x     = 38 + Math.random() * 24;          // concentra perto da fogueira
      const delay = Math.random() * 6;
      const dur   = 4 + Math.random() * 5;
      const drift = (Math.random() - 0.5) * 90;
      const size  = 2 + Math.random() * 4;
      html += '<div class="ember" style="left:' + x + '%;width:' + size + 'px;height:' + size + 'px;animation-duration:' + dur + 's;animation-delay:' + delay + 's;--drift:' + drift + 'px"></div>';
    }
    host.innerHTML = html;
  })();
</script>

</body>
</html>
