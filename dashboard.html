<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Painel — CrieConvites</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,700;0,9..144,900;1,9..144,700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#FFF8F0;--bg2:#FFF0E6;--panel:#FFFFFF;
      --pink:#FF3D6B;--pink-dark:#CC1F4E;
      --yellow:#FFD93D;--yellow-dk:#E6B800;
      --green:#16A34A;--blue:#2563EB;
      --white:#1A0A00;--border:rgba(26,10,0,0.09);
      --font-display:'Fraunces',Georgia,serif;
      --font-body:'Nunito',system-ui,sans-serif;
      --ease:cubic-bezier(0.16,1,0.3,1);
    }
    body{font-family:var(--font-body);background:var(--bg);color:var(--white);min-height:100vh;display:grid;grid-template-columns:240px 1fr;-webkit-font-smoothing:antialiased;}
    a{text-decoration:none;color:inherit;}

    .sidenav{background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;min-height:100vh;position:sticky;top:0;}
    .sidenav-logo{padding:1.5rem;border-bottom:1px solid var(--border);font-family:var(--font-display);font-size:1.3rem;font-weight:700;font-style:italic;background:linear-gradient(135deg,var(--pink),var(--yellow));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;cursor:pointer;}
    .sidenav-user{padding:1rem 1.25rem;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:.75rem;}
    .sidenav-avatar{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--pink),var(--yellow));display:flex;align-items:center;justify-content:center;font-size:1rem;font-weight:800;flex-shrink:0;color:#fff;}
    .sidenav-name{font-size:.85rem;font-weight:700;line-height:1.2;}
    .sidenav-email{font-size:.7rem;color:rgba(26,10,0,.35);}
    .sidenav-section{padding:.75rem 1rem .25rem;font-size:.65rem;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:rgba(26,10,0,.2);}
    .sidenav-item{display:flex;align-items:center;gap:.65rem;padding:.65rem 1.25rem;font-size:.88rem;font-weight:700;color:rgba(26,10,0,.5);cursor:pointer;border-left:3px solid transparent;transition:all .2s;border-radius:0 8px 8px 0;margin:0 .5rem 0 0;}
    .sidenav-item:hover{color:var(--white);background:rgba(26,10,0,.04);}
    .sidenav-item.active{color:var(--white);background:rgba(255,61,107,.08);border-left-color:var(--pink);}
    .sidenav-icon{font-size:1rem;width:20px;text-align:center;}
    .sidenav-badge{margin-left:auto;background:var(--pink);color:#fff;font-size:.65rem;font-weight:800;padding:.1rem .4rem;border-radius:99px;}
    .sidenav-bottom{margin-top:auto;padding:1.25rem;border-top:1px solid var(--border);}
    .btn-new-invite{width:100%;padding:.75rem;background:var(--pink);color:#fff;border:none;border-radius:10px;font-family:var(--font-body);font-size:.85rem;font-weight:800;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:.5rem;transition:background .2s,transform .2s;box-shadow:0 6px 20px rgba(255,61,107,.3);}
    .btn-new-invite:hover{background:var(--pink-dark);transform:translateY(-1px);}

    .main{display:flex;flex-direction:column;min-height:100vh;}
    .topbar{height:60px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 2rem;flex-shrink:0;position:sticky;top:0;background:rgba(255,248,240,.93);backdrop-filter:blur(12px);z-index:10;}
    .topbar-title{font-size:1.1rem;font-weight:800;}
    .topbar-right{display:flex;align-items:center;gap:1rem;}
    .icon-btn{width:36px;height:36px;border-radius:50%;background:rgba(26,10,0,.05);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:.9rem;transition:background .2s;}
    .icon-btn:hover{background:rgba(26,10,0,.1);}
    .content{padding:2rem;flex:1;}

    .stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:1.25rem;margin-bottom:2rem;}
    .stat-card{background:var(--panel);border:1px solid var(--border);border-radius:16px;padding:1.25rem;transition:transform .3s var(--ease),box-shadow .3s;animation:fadeUp .5s var(--ease) both;}
    .stat-card:hover{transform:translateY(-3px);box-shadow:0 12px 40px rgba(26,10,0,0.12);}
    .stat-card:nth-child(2){animation-delay:.08s;}.stat-card:nth-child(3){animation-delay:.16s;}.stat-card:nth-child(4){animation-delay:.24s;}
    .stat-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:.75rem;}
    .stat-icon{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:1.1rem;}
    .stat-icon.pink{background:rgba(255,61,107,.12);}.stat-icon.green{background:rgba(52,211,153,.12);}.stat-icon.yellow{background:rgba(255,217,61,.12);}.stat-icon.blue{background:rgba(96,165,250,.12);}
    .stat-trend{font-size:.72rem;font-weight:700;padding:.2rem .5rem;border-radius:99px;}
    .stat-trend.up{background:rgba(52,211,153,.15);color:var(--green);}.stat-trend.neutral{background:rgba(26,10,0,.05);color:rgba(26,10,0,.4);}
    .stat-num{font-family:var(--font-display);font-size:2rem;font-weight:900;font-style:italic;line-height:1;margin-bottom:.2rem;}
    .stat-label{font-size:.78rem;color:rgba(26,10,0,.4);font-weight:600;}

    .section-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem;}
    .section-hdr h2{font-size:1rem;font-weight:800;}
    .btn-xs{padding:.35rem .85rem;border-radius:8px;font-family:var(--font-body);font-size:.78rem;font-weight:700;cursor:pointer;border:none;transition:all .2s;}
    .btn-xs-outline{background:transparent;border:1px solid var(--border);color:rgba(26,10,0,.5);}
    .btn-xs-outline:hover{border-color:rgba(26,10,0,.3);color:var(--white);}
    .btn-xs-pink{background:var(--pink);color:#fff;}
    .btn-xs-pink:hover{background:var(--pink-dark);}

    .invite-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:1.25rem;margin-bottom:2rem;}
    .invite-card{background:var(--panel);border:1px solid var(--border);border-radius:16px;overflow:hidden;transition:transform .3s var(--ease),box-shadow .3s;cursor:pointer;}
    .invite-card:hover{transform:translateY(-4px);box-shadow:0 20px 50px rgba(26,10,0,0.14);}
    .invite-card-img{height:140px;background-size:cover;background-position:center;position:relative;}
    .invite-card-status{position:absolute;top:.75rem;right:.75rem;padding:.2rem .65rem;border-radius:99px;font-size:.65rem;font-weight:800;letter-spacing:.06em;text-transform:uppercase;}
    .status-published{background:rgba(52,211,153,.2);color:var(--green);border:1px solid rgba(52,211,153,.3);}
    .status-draft{background:rgba(26,10,0,.1);color:rgba(26,10,0,.5);border:1px solid rgba(26,10,0,.1);}
    .invite-card-body{padding:1rem;}
    .invite-card-title{font-size:.95rem;font-weight:800;margin-bottom:.25rem;}
    .invite-card-event{font-size:.75rem;color:rgba(26,10,0,.4);margin-bottom:.85rem;}
    .invite-card-stats{display:flex;gap:1rem;}
    .ic-stat{display:flex;align-items:center;gap:.3rem;font-size:.78rem;color:rgba(26,10,0,.5);font-weight:600;}
    .invite-card-actions{padding:.75rem 1rem;border-top:1px solid var(--border);display:flex;gap:.5rem;}

    .guests-panel{background:var(--panel);border:1px solid var(--border);border-radius:16px;overflow:hidden;margin-bottom:2rem;}
    .guests-header{padding:1.25rem 1.5rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.75rem;}
    .guests-search{display:flex;align-items:center;gap:.5rem;background:rgba(26,10,0,.05);border:1px solid var(--border);border-radius:8px;padding:.4rem .75rem;}
    .guests-search input{background:none;border:none;outline:none;color:var(--white);font-size:.85rem;width:180px;font-family:var(--font-body);}
    .guests-search input::placeholder{color:rgba(26,10,0,.25);}
    .filter-pills{display:flex;gap:.4rem;flex-wrap:wrap;}
    .filter-pill{padding:.3rem .75rem;border-radius:99px;font-size:.72rem;font-weight:700;cursor:pointer;border:1px solid var(--border);background:transparent;color:rgba(26,10,0,.4);transition:all .2s;}
    .filter-pill:hover,.filter-pill.active{border-color:var(--pink);color:var(--pink);}
    table{width:100%;border-collapse:collapse;}
    th{padding:.75rem 1.5rem;font-size:.7rem;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:rgba(26,10,0,.3);text-align:left;border-bottom:1px solid var(--border);}
    td{padding:.85rem 1.5rem;font-size:.85rem;border-bottom:1px solid rgba(26,10,0,.04);}
    tr:last-child td{border-bottom:none;}
    tr:hover td{background:rgba(26,10,0,.02);}
    .guest-name{font-weight:700;}.guest-phone{color:rgba(26,10,0,.4);font-size:.78rem;}
    .badge{display:inline-flex;align-items:center;gap:.25rem;padding:.2rem .6rem;border-radius:99px;font-size:.7rem;font-weight:700;}
    .badge-yes{background:rgba(52,211,153,.12);color:var(--green);border:1px solid rgba(52,211,153,.2);}
    .badge-no{background:rgba(248,113,113,.12);color:#f87171;border:1px solid rgba(248,113,113,.2);}
    .badge-pending{background:rgba(26,10,0,.06);color:rgba(26,10,0,.4);border:1px solid rgba(26,10,0,.08);}
    .empty-state{padding:3rem;text-align:center;color:rgba(26,10,0,.25);}
    .empty-state-emoji{font-size:2.5rem;margin-bottom:.75rem;}

    .gifts-grid-dash{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:1rem;margin-bottom:2rem;}
    .gift-card-dash{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:1rem;transition:transform .2s;}
    .gift-card-dash:hover{transform:translateY(-2px);}
    .gift-emoji-dash{font-size:1.75rem;margin-bottom:.5rem;}
    .gift-name-dash{font-size:.85rem;font-weight:700;margin-bottom:.2rem;}
    .gift-price-dash{font-size:.75rem;color:var(--yellow-dk);font-weight:700;margin-bottom:.6rem;}
    .gift-reserver{font-size:.72rem;color:rgba(26,10,0,.4);}

    .share-box{background:linear-gradient(135deg,rgba(255,61,107,.08),rgba(255,217,61,.06));border:1px solid rgba(255,61,107,.15);border-radius:16px;padding:1.5rem;margin-bottom:2rem;}
    .share-box-title{font-family:var(--font-display);font-size:1.2rem;font-weight:700;font-style:italic;margin-bottom:.35rem;}
    .share-box-sub{font-size:.85rem;color:rgba(26,10,0,.5);margin-bottom:1rem;}
    .share-link-row{display:flex;gap:.5rem;align-items:center;}
    .share-link-input{flex:1;background:rgba(26,10,0,.06);border:1px solid rgba(26,10,0,.1);border-radius:10px;padding:.6rem 1rem;color:var(--white);font-size:.85rem;outline:none;font-family:var(--font-body);}
    .share-btns{display:flex;gap:.5rem;flex-wrap:wrap;margin-top:1rem;}
    .share-btn{display:flex;align-items:center;gap:.4rem;padding:.5rem 1rem;border-radius:8px;font-family:var(--font-body);font-size:.82rem;font-weight:700;cursor:pointer;border:none;transition:all .2s;}
    .share-wpp{background:#25D366;color:#fff;}.share-wpp:hover{background:#1da851;}
    .share-copy{background:rgba(26,10,0,.08);color:var(--white);border:1px solid var(--border);}.share-copy:hover{background:rgba(26,10,0,.15);}
    .share-view{background:rgba(96,165,250,.15);color:var(--blue);border:1px solid rgba(96,165,250,.2);}.share-view:hover{background:rgba(96,165,250,.25);}

    .rsvp-chart-wrap{display:flex;align-items:center;gap:1.5rem;margin-bottom:2rem;}
    .donut-wrap{position:relative;width:120px;height:120px;flex-shrink:0;}
    .donut-svg{width:100%;height:100%;transform:rotate(-90deg);}
    .donut-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;}
    .donut-num{font-family:var(--font-display);font-size:1.5rem;font-weight:900;font-style:italic;line-height:1;}
    .donut-label{font-size:.6rem;color:rgba(26,10,0,.35);font-weight:700;letter-spacing:.08em;text-transform:uppercase;}
    .rsvp-legend{display:flex;flex-direction:column;gap:.6rem;}
    .legend-item{display:flex;align-items:center;gap:.5rem;font-size:.82rem;font-weight:600;}
    .legend-dot{width:8px;height:8px;border-radius:50%;}

    .loading{display:flex;align-items:center;justify-content:center;padding:4rem;gap:.75rem;color:rgba(26,10,0,.4);font-weight:600;}

    /* ── MODAL ── */
    .modal-overlay{position:fixed;inset:0;background:rgba(26,10,0,.5);backdrop-filter:blur(3px);-webkit-backdrop-filter:blur(3px);z-index:200;display:none;align-items:center;justify-content:center;padding:1.5rem;}
    .modal-overlay.open{display:flex;}
    .modal-box{background:var(--panel);border-radius:16px;padding:1.75rem;width:100%;max-width:400px;box-shadow:0 30px 80px rgba(26,10,0,.3);}
    .modal-title{font-family:var(--font-display);font-size:1.2rem;font-weight:900;font-style:italic;margin-bottom:1.25rem;}
    .form-label{display:block;font-size:.72rem;font-weight:800;letter-spacing:.05em;text-transform:uppercase;color:rgba(26,10,0,.4);margin-bottom:.35rem;}
    .form-input{width:100%;background:rgba(26,10,0,.04);border:1px solid var(--border);border-radius:10px;padding:.65rem .9rem;font-family:var(--font-body);font-size:.9rem;color:var(--white);outline:none;margin-bottom:1rem;transition:border-color .2s;}
    .form-input:focus{border-color:var(--pink);}

    /* ── SWITCH (notificações) ── */
    .switch-row{display:flex;align-items:center;justify-content:space-between;gap:1rem;padding:.85rem 0;border-bottom:1px solid var(--border);}
    .switch-label{font-size:.88rem;font-weight:700;}
    .switch-sub{font-size:.72rem;color:rgba(26,10,0,.4);font-weight:600;}
    .switch{position:relative;width:44px;height:24px;flex-shrink:0;}
    .switch input{opacity:0;width:0;height:0;}
    .switch .slider{position:absolute;inset:0;background:rgba(26,10,0,.15);border-radius:99px;cursor:pointer;transition:background .2s;}
    .switch .slider::before{content:'';position:absolute;left:3px;top:3px;width:18px;height:18px;border-radius:50%;background:#fff;transition:transform .2s;box-shadow:0 1px 3px rgba(26,10,0,.2);}
    .switch input:checked + .slider{background:var(--green);}
    .switch input:checked + .slider::before{transform:translateX(20px);}

    .toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%) translateY(80px);background:#1e1e1e;color:#fff;border-radius:12px;padding:.75rem 1.5rem;font-size:.85rem;font-weight:700;display:flex;align-items:center;gap:.5rem;box-shadow:0 16px 40px rgba(26,10,0,0.25);transition:transform .3s var(--ease);z-index:100;}
    .toast.show{transform:translateX(-50%) translateY(0);}

    /* ── SELETOR DE CONVITES ── */
    .invite-switcher{display:flex;align-items:center;gap:.5rem;background:rgba(26,10,0,.04);border:1px solid var(--border);border-radius:10px;padding:.35rem .5rem .35rem .75rem;max-width:280px;}
    .invite-switcher select{background:none;border:none;outline:none;font-family:var(--font-body);font-size:.82rem;font-weight:700;color:var(--white);cursor:pointer;max-width:200px;text-overflow:ellipsis;}
    .invite-switcher select:focus-visible{outline:2px solid var(--pink);border-radius:6px;}

    /* ── COUNTDOWN ── */
    .countdown-box{background:linear-gradient(135deg,var(--pink),#FF6B8F);border-radius:16px;padding:1.5rem;color:#fff;display:flex;align-items:center;justify-content:space-between;gap:1rem;flex-wrap:wrap;margin-bottom:2rem;box-shadow:0 14px 40px rgba(255,61,107,.3);animation:fadeUp .5s var(--ease) both;position:relative;overflow:hidden;}
    .countdown-box::after{content:'🎉';position:absolute;right:-10px;bottom:-18px;font-size:6rem;opacity:.14;transform:rotate(-15deg);}
    .countdown-title{font-family:var(--font-display);font-size:1.15rem;font-weight:900;font-style:italic;margin-bottom:.2rem;}
    .countdown-sub{font-size:.8rem;opacity:.85;font-weight:600;}
    .countdown-units{display:flex;gap:.6rem;position:relative;z-index:1;}
    .cd-unit{background:rgba(255,255,255,.16);backdrop-filter:blur(4px);border-radius:12px;padding:.6rem .85rem;text-align:center;min-width:64px;}
    .cd-num{font-family:var(--font-display);font-size:1.6rem;font-weight:900;font-style:italic;line-height:1;}
    .cd-lbl{font-size:.6rem;font-weight:800;letter-spacing:.08em;text-transform:uppercase;opacity:.85;margin-top:.25rem;}

    /* ── CHECKLIST DE PROGRESSO ── */
    .checklist-panel{background:var(--panel);border:1px solid var(--border);border-radius:16px;padding:1.5rem;margin-bottom:2rem;animation:fadeUp .5s var(--ease) both;}
    .checklist-bar{height:8px;background:rgba(26,10,0,.06);border-radius:99px;overflow:hidden;margin:.85rem 0 1.1rem;}
    .checklist-bar-fill{height:100%;background:linear-gradient(90deg,var(--pink),var(--yellow));border-radius:99px;transition:width .8s var(--ease);}
    .checklist-items{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:.5rem;}
    .check-item{display:flex;align-items:center;gap:.55rem;font-size:.82rem;font-weight:700;padding:.55rem .7rem;border-radius:10px;color:rgba(26,10,0,.45);cursor:pointer;transition:background .2s;border:1px dashed var(--border);}
    .check-item:hover{background:rgba(26,10,0,.03);}
    .check-item.done{color:var(--green);border:1px solid rgba(52,211,153,.25);background:rgba(52,211,153,.06);cursor:default;}
    .check-dot{width:20px;height:20px;border-radius:50%;border:2px solid rgba(26,10,0,.15);display:flex;align-items:center;justify-content:center;font-size:.65rem;flex-shrink:0;}
    .check-item.done .check-dot{background:var(--green);border-color:var(--green);color:#fff;}

    /* ── GRÁFICO DE CONFIRMAÇÕES ── */
    .chart-bars{display:flex;align-items:flex-end;gap:6px;height:110px;padding-top:.5rem;}
    .chart-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:.3rem;height:100%;justify-content:flex-end;}
    .chart-bar{width:100%;max-width:26px;background:linear-gradient(180deg,var(--pink),#FF6B8F);border-radius:6px 6px 3px 3px;min-height:3px;transition:height .6s var(--ease);position:relative;}
    .chart-bar.zero{background:rgba(26,10,0,.06);}
    .chart-bar:hover::after{content:attr(data-v);position:absolute;top:-1.4rem;left:50%;transform:translateX(-50%);background:#1e1e1e;color:#fff;font-size:.62rem;font-weight:800;padding:.1rem .4rem;border-radius:6px;white-space:nowrap;}
    .chart-day{font-size:.58rem;font-weight:800;color:rgba(26,10,0,.3);text-transform:uppercase;}

    /* ── QR CODE ── */
    .qr-wrap{display:flex;align-items:center;gap:1.25rem;margin-top:1.25rem;padding-top:1.25rem;border-top:1px dashed rgba(255,61,107,.2);flex-wrap:wrap;}
    .qr-box{background:#fff;border:1px solid var(--border);border-radius:12px;padding:.6rem;box-shadow:0 6px 20px rgba(26,10,0,.08);}
    .qr-box img{display:block;width:120px;height:120px;}

    /* ── MURAL DE RECADOS ── */
    .mural-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:1rem;}
    .mural-card{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:1.1rem;position:relative;animation:fadeUp .5s var(--ease) both;transition:transform .3s var(--ease),box-shadow .3s;}
    .mural-card:hover{transform:translateY(-3px) rotate(-.5deg);box-shadow:0 14px 36px rgba(26,10,0,.1);}
    .mural-card::before{content:'❝';position:absolute;top:.35rem;right:.75rem;font-size:1.6rem;color:rgba(255,61,107,.18);font-family:var(--font-display);}
    .mural-msg{font-size:.88rem;line-height:1.5;margin-bottom:.8rem;color:rgba(26,10,0,.75);font-style:italic;}
    .mural-author{display:flex;align-items:center;gap:.5rem;font-size:.78rem;font-weight:800;}
    .mural-ava{width:26px;height:26px;border-radius:50%;background:linear-gradient(135deg,var(--pink),var(--yellow));color:#fff;display:flex;align-items:center;justify-content:center;font-size:.72rem;flex-shrink:0;}
    .mural-when{font-size:.68rem;color:rgba(26,10,0,.3);font-weight:600;margin-left:auto;}

    /* ── AÇÕES POR CONVIDADO ── */
    .guest-wpp-btn{display:inline-flex;align-items:center;gap:.25rem;background:rgba(37,211,102,.12);color:#128C4B;border:1px solid rgba(37,211,102,.25);border-radius:8px;padding:.25rem .55rem;font-size:.7rem;font-weight:800;cursor:pointer;font-family:var(--font-body);transition:all .2s;}
    .guest-wpp-btn:hover{background:#25D366;color:#fff;}
    th.sortable{cursor:pointer;user-select:none;}
    th.sortable:hover{color:var(--pink);}

<script>
const SUPA_URL = 'https://wevmgnzmkdecdcnouhjq.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Indldm1nbnpta2RlY2Rjbm91aGpxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3MTI5MTYsImV4cCI6MjA5MjI4ODkxNn0.R7IF4vEF_D5fvB18ZRl8mJwXOsEpW-q2hSdsRRs9nM4';
const sb = supabase.createClient(SUPA_URL, SUPA_KEY);

// Escapa strings dinâmicas antes de injetar via innerHTML — previne XSS
const esc = s => String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

let currentUser = null;
let invites = [];
let activeInvite = null;
let guests = [];
let gifts = [];
let activeSection = 'overview';

async function init(){
  const { data:{ session } } = await sb.auth.getSession();
  if(!session){ location.href='login.html'; return; }
  currentUser = session.user;

  // ── ISOLAMENTO DE DADOS ENTRE USUÁRIOS ──
  // Se o último usuário guardado no localStorage é diferente do atual,
  // limpa qualquer cache de convite/draft que possa pertencer a outra conta.
  const lastUser = localStorage.getItem('ccm_last_user_id');
  if(lastUser && lastUser !== currentUser.id){
    ['ccm_current_slug','ccm_current_invite','ccm_draft','ccm_edit_invite','ccm_template']
      .forEach(k => localStorage.removeItem(k));
  }
  localStorage.setItem('ccm_last_user_id', currentUser.id);

  // ── VERIFICA SE USUÁRIO É EMPRESA → redireciona para dashboard-empresa ──
  try {
    const [profRes, compRes] = await Promise.all([
      sb.from('profiles').select('plan, company_id').eq('id', currentUser.id).maybeSingle(),
      sb.from('companies').select('id').eq('owner_id', currentUser.id).eq('active', true).maybeSingle()
    ]);
    const isEnterprise = profRes.data?.plan === 'enterprise' || !!compRes.data;
    if(isEnterprise){
      location.replace('dashboard-empresa.html');
      return;
    }
  } catch(e){
    console.warn('[CCM] Falha ao verificar role do usuário:', e);
  }

  // User UI
  const name = session.user.user_metadata?.name || session.user.email.split('@')[0];
  document.getElementById('userAvatar').textContent = name[0].toUpperCase();
  document.getElementById('userName').textContent = name;
  document.getElementById('userEmail').textContent = session.user.email;

  await loadData();
  populateInviteSwitcher();
  updateMuralBadge();
  render();
  subscribeRealtime();
}

// ── REALTIME (re-assinável ao trocar de convite) ──
let rtChannel = null;
function subscribeRealtime(){
  if(rtChannel){ try{ sb.removeChannel(rtChannel); }catch(_){} rtChannel = null; }
  if(!activeInvite) return;
  rtChannel = sb.channel('guests-'+activeInvite.id)
    .on('postgres_changes',{event:'INSERT',schema:'public',table:'guests',filter:'invite_id=eq.'+activeInvite.id},
      payload=>{
        if(guests.some(g=>g.id===payload.new.id)) return; // já inserido localmente
        guests.unshift(payload.new);
        document.getElementById('guestBadge').textContent = guests.length;
        updateMuralBadge();
        if(['overview','guests','mural'].includes(activeSection)) render();
        if(payload.new.attending==='yes') fireConfetti();
        showToast('🎉 Novo convidado: '+(payload.new.name||''));
      })
    .subscribe();
}

// ── SELETOR DE CONVITES ──
function populateInviteSwitcher(){
  const wrap = document.getElementById('inviteSwitcher');
  const sel = document.getElementById('inviteSelect');
  if(invites.length < 2){ wrap.style.display = 'none'; return; }
  wrap.style.display = 'flex';
  sel.innerHTML = invites.map(i=>
    `<option value="${esc(i.id)}" ${i.id===activeInvite?.id?'selected':''}>${i.published?'✅':'📝'} ${esc(i.title||i.event_name||i.slug||'Sem título')}</option>`
  ).join('');
}

async function switchInvite(id){
  const inv = invites.find(i=>i.id===id);
  if(!inv || inv.id===activeInvite?.id) return;
  activeInvite = inv;
  if(inv.slug) localStorage.setItem('ccm_current_slug', inv.slug);
  else localStorage.removeItem('ccm_current_slug');
  document.getElementById('mainContent').innerHTML = '<div class="loading">⏳ Carregando convite...</div>';
  const [gRes, gfRes] = await Promise.all([
    sb.from('guests').select('*').eq('invite_id', inv.id).order('created_at',{ascending:false}),
    sb.from('gifts').select('*').eq('invite_id', inv.id).order('created_at',{ascending:true})
  ]);
  guests = gRes.data || [];
  gifts = gfRes.data || [];
  document.getElementById('guestBadge').textContent = guests.length;
  updateMuralBadge();
  subscribeRealtime();
  render();
  showToast('🎪 Agora exibindo: '+(inv.title||inv.event_name||inv.slug||'convite'));
}

function updateMuralBadge(){
  const n = guests.filter(g=>(g.message||'').trim()).length;
  const b = document.getElementById('muralBadge');
  if(!b) return;
  b.textContent = n;
  b.style.display = n ? '' : 'none';
}

async function loadData(){
  // Load all invites for this user
  const {data:invData, error:invErr} = await sb
    .from('invites')
    .select('*')
    .eq('user_id', currentUser.id)
    .order('created_at', {ascending:false});

  if(invErr) console.error('Erro ao carregar convites:', invErr);
  invites = invData || [];

  // Fallback seguro: se não veio nada, tenta buscar pelo slug salvo SEMPRE filtrando por user_id.
  // Isso evita vazamento de dados entre contas diferentes que tenham o mesmo navegador.
  if(!invites.length){
    const savedSlug = localStorage.getItem('ccm_current_slug');
    if(savedSlug){
      const {data:slugData} = await sb
        .from('invites')
        .select('*')
        .eq('slug', savedSlug)
        .eq('user_id', currentUser.id)
        .limit(1);
      if(slugData && slugData.length) invites = slugData;
      else localStorage.removeItem('ccm_current_slug'); // slug não é deste usuário, descarta
    }
  }

  // Usar convite preferido: slug atual > mais recente publicado > primeiro
  const currentSlug = localStorage.getItem('ccm_current_slug');
  if(currentSlug){
    const found = invites.find(i=>i.slug===currentSlug);
    if(found) activeInvite = found;
  }
  if(!activeInvite){
    activeInvite = invites.find(i=>i.published===true) || invites[0] || null;
  }

  if(activeInvite){
    // Load guests
    const {data:gData} = await sb.from('guests').select('*').eq('invite_id',activeInvite.id).order('created_at',{ascending:false});
    guests = gData || [];
    document.getElementById('guestBadge').textContent = guests.length;

    // Load gifts
    const {data:gfData} = await sb.from('gifts').select('*').eq('invite_id',activeInvite.id).order('created_at',{ascending:true});
    gifts = gfData || [];
  }
}

function showSection(s, el, mtabEl){
  activeSection = s;
  const titles={overview:'Visão Geral',guests:'Convidados',gifts:'Presentes',mural:'Mural de recados',share:'Compartilhar',notifications:'Notificações',upgrade:'Fazer Upgrade'};
  document.getElementById('pageTitle').textContent = titles[s]||s;
  document.querySelectorAll('.sidenav-item').forEach(i=>i.classList.remove('active'));
  if(el) el.classList.add('active');
  document.querySelectorAll('.mtab').forEach(t=>t.classList.toggle('active', t.dataset.mtab===s));
  render();
}

function render(){
  const c = document.getElementById('mainContent');
  if(activeSection==='overview') c.innerHTML = renderOverview();
  else if(activeSection==='guests') c.innerHTML = renderGuestsSection();
  else if(activeSection==='gifts') c.innerHTML = renderGiftsSection();
  else if(activeSection==='mural') c.innerHTML = renderMural();
  else if(activeSection==='share') c.innerHTML = renderShare();
  else if(activeSection==='notifications') c.innerHTML = renderNotifications();
  else if(activeSection==='upgrade') c.innerHTML = renderUpgrade();
  mountQR();
  mountCountdown();
}

// ── OVERVIEW ──
function renderOverview(){
  const yes=guests.filter(g=>g.attending==='yes');
  const no=guests.filter(g=>g.attending==='no');
  const pending=guests.filter(g=>g.attending==='maybe'||!g.attending);
  const totalPeople=yes.reduce((s,g)=>s+(parseInt(g.plus_ones)||0)+1,0);
  const reservedGifts=gifts.filter(g=>g.reserved).length;
  const pct=guests.length?Math.round(yes.length/guests.length*100):0;
  const r=54,circ=2*Math.PI*r,dash=circ*(pct/100);

  const invTitle = activeInvite?.title || activeInvite?.event_name || activeInvite?.slug || 'Convite sem título';
  const invImg = String(activeInvite?.photo_url || 'https://images.unsplash.com/photo-1530103862676-de8c9debad1d?w=400&q=70').replace(/["'<>\\]/g,'');
  const invDate = activeInvite?.event_date ? new Date(activeInvite.event_date+'T12:00').toLocaleDateString('pt-BR',{day:'numeric',month:'long',year:'numeric'}) : 'Data não definida';

  const h=new Date().getHours();
  const saud=h<5?'Boa madrugada':h<12?'Bom dia':h<18?'Boa tarde':'Boa noite';
  const uname=(currentUser?.user_metadata?.name||currentUser?.email?.split('@')[0]||'').split(' ')[0];
  const sub = !activeInvite ? 'Que tal criar seu primeiro convite hoje?'
    : pending.length ? `Você tem ${pending.length} resposta(s) pendente(s) — um lembrete pode ajudar. 😉`
    : guests.length ? 'Tudo em dia por aqui. Sua festa está tomando forma! 🎈'
    : 'Compartilhe seu convite para começar a receber confirmações.';

  return `
    <div style="margin-bottom:1.5rem;animation:fadeUp .5s var(--ease) both">
      <div style="font-family:var(--font-display);font-size:1.5rem;font-weight:900;font-style:italic">${saud}, ${esc(uname)}! 👋</div>
      <div style="font-size:.85rem;color:rgba(26,10,0,.45);font-weight:600;margin-top:.2rem">${sub}</div>
    </div>

    ${countdownHTML(invTitle)}
    ${checklistHTML()}

    <div class="stats-grid">
      <div class="stat-card"><div class="stat-top"><div class="stat-icon pink">📨</div><div class="stat-trend neutral">${invites.length} convite(s)</div></div><div class="stat-num">${guests.length}</div><div class="stat-label">Confirmações recebidas</div></div>
      <div class="stat-card"><div class="stat-top"><div class="stat-icon green">✅</div><div class="stat-trend up">+${yes.length}</div></div><div class="stat-num">${yes.length}</div><div class="stat-label">Confirmados</div></div>
      <div class="stat-card"><div class="stat-top"><div class="stat-icon yellow">👥</div><div class="stat-trend neutral">pessoas</div></div><div class="stat-num">${totalPeople}</div><div class="stat-label">Pessoas confirmadas</div></div>
      <div class="stat-card"><div class="stat-top"><div class="stat-icon blue">🎁</div><div class="stat-trend up">${reservedGifts} reserv.</div></div><div class="stat-num">${reservedGifts}/${gifts.length}</div><div class="stat-label">Presentes reservados</div></div>
    </div>

    ${activeInvite ? `
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:1.5rem;margin-bottom:2rem">
      <div style="background:var(--panel);border:1px solid var(--border);border-radius:16px;padding:1.5rem">
        <div style="font-size:.9rem;font-weight:800;margin-bottom:1.25rem">Status das confirmações</div>
        <div class="rsvp-chart-wrap">
          <div class="donut-wrap">
            <svg class="donut-svg" viewBox="0 0 120 120">
              <circle cx="60" cy="60" r="${r}" fill="none" stroke="rgba(26,10,0,.05)" stroke-width="10"/>
              <circle cx="60" cy="60" r="${r}" fill="none" stroke="var(--green)" stroke-width="10" stroke-dasharray="${dash} ${circ}" stroke-linecap="round"/>
            </svg>
            <div class="donut-center"><div class="donut-num">${pct}%</div><div class="donut-label">confirm.</div></div>
          </div>
          <div class="rsvp-legend">
            <div class="legend-item"><div class="legend-dot" style="background:var(--green)"></div>Confirmados: ${yes.length}</div>
            <div class="legend-item"><div class="legend-dot" style="background:#f87171"></div>Recusados: ${no.length}</div>
            <div class="legend-item"><div class="legend-dot" style="background:rgba(26,10,0,.2)"></div>Pendentes: ${pending.length}</div>
          </div>
        </div>
      </div>
      <div style="background:var(--panel);border:1px solid var(--border);border-radius:16px;overflow:hidden">
        <div style="height:120px;background-image:url('${invImg}');background-size:cover;background-position:center;position:relative">
          <span style="position:absolute;top:.6rem;right:.6rem" class="badge badge-${activeInvite.published?'yes':'pending'}">${activeInvite.published?'✅ Publicado':'📝 Rascunho'}</span>
        </div>
        <div style="padding:1rem">
          <div style="font-weight:800;margin-bottom:.25rem">${esc(invTitle)}</div>
          <div style="font-size:.75rem;color:rgba(26,10,0,.4);margin-bottom:1rem">${invDate}</div>
          <div style="display:flex;gap:.5rem;flex-wrap:wrap">
            <button class="btn-xs btn-xs-outline" onclick="openPublicInvite()">👁 Ver</button>
            <button class="btn-xs btn-xs-outline" style="color:#f87171;border-color:rgba(248,113,113,.3)" onclick="confirmDeleteInvite('${activeInvite?.id}')">🗑 Deletar</button>
          </div>
        </div>
      </div>
    </div>` : `<div class="empty-state"><div class="empty-state-emoji">🎉</div><div style="font-weight:700;margin-bottom:.5rem">Nenhum convite publicado ainda</div><button class="btn-xs btn-xs-pink" onclick="location.href='templates.html'" style="margin-top:1rem;padding:.5rem 1.25rem">✨ Criar meu primeiro convite</button></div>`}

    ${chartHTML()}

    <div class="section-hdr"><h2>📋 Últimas confirmações</h2><button class="btn-xs btn-xs-outline" onclick="showSection('guests')">Ver todos →</button></div>
    ${renderGuestsTable(guests.slice(0,5))}
    ${renderShare()}
  `;
}

// ── COUNTDOWN ──
function countdownHTML(invTitle){
  if(!activeInvite?.event_date) return '';
  const dt = new Date(activeInvite.event_date+'T'+(activeInvite.event_time||'12:00'));
  if(isNaN(dt)) return '';
  const diff = dt - Date.now();
  if(diff <= 0){
    const passed = (Date.now() - dt) > 86400000;
    return `<div class="countdown-box">
      <div>
        <div class="countdown-title">${passed?'🎊 Como foi a festa?':'🎉 É hoje! Chegou o grande dia!'}</div>
        <div class="countdown-sub">${passed?'Esperamos que tenha sido incrível. Que tal já criar o próximo convite?':'Aproveite cada momento — seus convidados estão a caminho.'}</div>
      </div>
      ${passed?`<button onclick="newInvite()" style="background:#fff;color:var(--pink);border:none;border-radius:10px;padding:.6rem 1.25rem;font-family:var(--font-body);font-size:.82rem;font-weight:800;cursor:pointer;position:relative;z-index:1">✨ Criar próximo evento</button>`:''}
    </div>`;
  }
  return `<div class="countdown-box">
    <div style="position:relative;z-index:1">
      <div class="countdown-title">Contagem regressiva 🎈</div>
      <div class="countdown-sub">${esc(invTitle)} — falta pouco!</div>
    </div>
    <div class="countdown-units">
      <div class="cd-unit"><div class="cd-num" id="cdD">--</div><div class="cd-lbl">dias</div></div>
      <div class="cd-unit"><div class="cd-num" id="cdH">--</div><div class="cd-lbl">horas</div></div>
      <div class="cd-unit"><div class="cd-num" id="cdM">--</div><div class="cd-lbl">min</div></div>
      <div class="cd-unit"><div class="cd-num" id="cdS">--</div><div class="cd-lbl">seg</div></div>
    </div>
  </div>`;
}

let cdTimer = null;
function mountCountdown(){
  clearInterval(cdTimer);
  if(!document.getElementById('cdD') || !activeInvite?.event_date) return;
  const dt = new Date(activeInvite.event_date+'T'+(activeInvite.event_time||'12:00'));
  if(isNaN(dt)) return;
  const set=(id,v)=>{ const el=document.getElementById(id); if(el) el.textContent=String(v).padStart(2,'0'); };
  const tick=()=>{
    let d = dt - Date.now();
    if(d < 0){ clearInterval(cdTimer); render(); return; }
    set('cdD', Math.floor(d/86400000));
    set('cdH', Math.floor(d%86400000/3600000));
    set('cdM', Math.floor(d%3600000/60000));
    set('cdS', Math.floor(d%60000/1000));
  };
  tick();
  cdTimer = setInterval(tick, 1000);
}

// ── GRÁFICO: CONFIRMAÇÕES POR DIA ──
function chartHTML(){
  if(!activeInvite || !guests.length) return '';
  const days=[];
  for(let i=13;i>=0;i--){ const d=new Date(); d.setHours(0,0,0,0); d.setDate(d.getDate()-i); days.push(d); }
  const counts = days.map(d=>{
    const end = d.getTime()+86400000;
    return guests.filter(g=>{ const t=new Date(g.created_at).getTime(); return t>=d.getTime() && t<end; }).length;
  });
  const total = counts.reduce((a,b)=>a+b,0);
  if(!total) return '';
  const max = Math.max(...counts,1);
  return `<div style="background:var(--panel);border:1px solid var(--border);border-radius:16px;padding:1.5rem;margin-bottom:2rem;animation:fadeUp .5s var(--ease) both">
    <div style="display:flex;justify-content:space-between;align-items:baseline;flex-wrap:wrap;gap:.5rem">
      <div style="font-size:.9rem;font-weight:800">📈 Confirmações — últimos 14 dias</div>
      <div style="font-size:.75rem;color:rgba(26,10,0,.4);font-weight:700">${total} no período</div>
    </div>
    <div class="chart-bars">${days.map((d,i)=>
      `<div class="chart-col"><div class="chart-bar ${counts[i]?'':'zero'}" data-v="${counts[i]} em ${d.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'})}" style="height:${counts[i]?Math.max(10,Math.round(counts[i]/max*100)):4}%"></div><div class="chart-day">${d.getDate()}</div></div>`
    ).join('')}</div>
  </div>`;
}

function openGuestModal(){
  if(!activeInvite){ showToast('✨ Crie um convite primeiro'); return; }
  document.getElementById('newGuestName').value='';
  document.getElementById('newGuestPhone').value='';
  document.getElementById('newGuestPlus').value='0';
  document.getElementById('newGuestStatus').value='maybe';
  document.getElementById('guestModal').classList.add('open');
  setTimeout(()=>document.getElementById('newGuestName').focus(),60);
}
function closeGuestModal(){ document.getElementById('guestModal').classList.remove('open'); }
async function saveNewGuest(){
  const name = document.getElementById('newGuestName').value.trim();
  if(!name){ showToast('Digite o nome do convidado'); return; }
  const phone = document.getElementById('newGuestPhone').value.trim();
  const plus = Math.min(20, Math.max(0, parseInt(document.getElementById('newGuestPlus').value)||0));
  const attending = document.getElementById('newGuestStatus').value;
  const {data, error} = await sb.from('guests')
    .insert({invite_id:activeInvite.id, name, phone:phone||null, plus_ones:plus, attending})
    .select().single();
  if(error){ showToast('❌ Erro ao adicionar: '+error.message); return; }
  if(data && !guests.some(g=>g.id===data.id)) guests.unshift(data);
  document.getElementById('guestBadge').textContent = guests.length;
  closeGuestModal();
  render();
  showToast('✅ '+name+' entrou na lista!');
}

// ── WHATSAPP DIRETO PARA O CONVIDADO ──
function guestWhatsApp(digits, name){
  let p = String(digits).replace(/\D/g,'');
  if(p.length<=11 && !p.startsWith('55')) p = '55'+p;
  const inv = activeInvite||{};
  const link = inv.slug ? `${location.origin}/${inv.slug}` : '';
  const first = (name||'').split(' ')[0];
  const L = [`Oi${first?' '+first:''}! 👋`, `Passando para lembrar do evento: ${(inv.title||inv.event_name||'nossa festa')} 🎉`];
  if(link){ L.push(''); L.push('Detalhes e confirmação de presença:'); L.push(link); }
  window.open('https://wa.me/'+p+'?text='+encodeURIComponent(L.join('\n')),'_blank');
}

// ── QR CODE ──
function mountQR(){
  const el = document.getElementById('qrCode');
  if(!el || !activeInvite?.slug) return;
  const link = `${location.origin}/${activeInvite.slug}`;
  el.innerHTML = '';
  if(typeof QRCode !== 'undefined'){
    new QRCode(el, {text:link, width:120, height:120, colorDark:'#1A0A00', colorLight:'#ffffff'});
  } else {
    el.innerHTML = `<img src="https://api.qrserver.com/v1/create-qr-code/?size=120x120&data=${encodeURIComponent(link)}" alt="QR code do convite" width="120" height="120"/>`;
  }
}
function downloadQR(){
  const el = document.getElementById('qrCode');
  if(!el) return;
  const cv = el.querySelector('canvas');
  const img = el.querySelector('img');
  const url = cv ? cv.toDataURL('image/png') : (img ? img.src : null);
  if(!url){ showToast('QR ainda não carregou'); return; }
  const a = document.createElement('a');
  a.href = url; a.download = 'qr-convite.png'; a.click();
  showToast('⬇️ QR Code baixado!');
}

function toggleNotifInputs(){
  document.getElementById('notifEmailWrap').style.display = document.getElementById('notifEmail').checked ? 'block' : 'none';
  document.getElementById('notifWhatsWrap').style.display = document.getElementById('notifWhats').checked ? 'block' : 'none';
}

async function saveNotifPrefs(){
  if(!activeInvite) return;
  const ne = document.getElementById('notifEmail').checked;
  const nw = document.getElementById('notifWhats').checked;
  const emailTo = document.getElementById('notifEmailTo').value.trim();
  const whatsTo = document.getElementById('notifWhatsTo').value.trim().replace(/[^\d+]/g,'');
  if(ne && !emailTo){ showToast('📧 Informe o e-mail para receber os avisos'); return; }
  if(nw && !whatsTo){ showToast('💬 Informe o número de WhatsApp'); return; }
  const patch = { notify_email:ne, notify_whatsapp:nw, notify_email_to:emailTo||null, notify_whatsapp_to:whatsTo||null };
  const {error} = await sb.from('invites').update(patch).eq('id',activeInvite.id).eq('user_id',currentUser.id);
  if(error){ showToast('❌ Erro ao salvar: '+error.message); return; }
  Object.assign(activeInvite, patch);
  showToast('🔔 Preferências de notificação salvas!');
}

// ── DELETE INVITE ──
async function confirmDeleteInvite(id){
  if(!id) return;
  const inv = invites.find(i=>i.id===id);
  if(!inv) return;
  if(!confirm(`Tem certeza que deseja deletar o convite "${inv.title}"?\n\nEsta ação não pode ser desfeita. Todos os convidados e presentes serão removidos.`)) return;
  const {error} = await sb.from('invites').delete().eq('id',id).eq('user_id',currentUser.id);
  if(error){ showToast('❌ Erro ao deletar: '+error.message); return; }
  showToast('🗑 Convite deletado com sucesso.');
  // Limpa TUDO do localStorage relacionado ao convite deletado
  ['ccm_current_slug','ccm_current_invite','ccm_draft','ccm_edit_invite','ccm_template'].forEach(k=>localStorage.removeItem(k));
  await loadData();
  render();
}

// ── FILTER ──
function filterByStatus(s,btn){
  document.querySelectorAll('.filter-pill').forEach(p=>p.classList.remove('active'));
  btn.classList.add('active');
  const list=s==='all'?guests:guests.filter(g=>g.attending===s||(s==='maybe'&&!g.attending));
  document.getElementById('guestsTableWrap').innerHTML=renderGuestsTable(list);
}
function filterGuests(q){
  const list=guests.filter(g=>g.name.toLowerCase().includes(q.toLowerCase())||(g.phone||'').includes(q));
  document.getElementById('guestsTableWrap').innerHTML=renderGuestsTable(list);
}

// ── ACTIONS ──
function markShared(){ if(activeInvite) localStorage.setItem('ccm_shared_'+activeInvite.id,'1'); }
function copyLink(link){navigator.clipboard.writeText(link).then(()=>{ markShared(); showToast('✅ Link copiado!'); });}
function shareWhatsApp(link, titleArg){
  markShared();
  const inv = activeInvite || {};
  const displayTitle = (inv.title || inv.event_name || titleArg || 'Convite especial').trim();
  const nome  = (inv.event_name || '').trim();
  const local = (inv.location || '').trim();

  let dateStr = '';
  if(inv.event_date){
    try{
      const d = new Date(inv.event_date + 'T12:00:00');
      dateStr = d.toLocaleDateString('pt-BR', {weekday:'long', day:'numeric', month:'long'});
      dateStr = dateStr.charAt(0).toUpperCase() + dateStr.slice(1);
    }catch(_){}
  }
  const hora    = (inv.event_time || '').replace(':','h').replace(/h00$/,'h');
  const horaFim = (inv.event_time_end || '').replace(':','h').replace(/h00$/,'h');
  const horaStr = hora ? (horaFim ? `das ${hora} às ${horaFim}` : `às ${hora}`) : '';

  const L = [];
  L.push('🎉 ' + displayTitle);
  if(nome && nome !== displayTitle) L.push('Para: ' + nome);
  if(dateStr) L.push('📅 ' + dateStr + (horaStr ? ' ' + horaStr : ''));
  if(local)   L.push('📍 ' + local);
  L.push('');
  L.push('Confirme sua presença:');
  L.push(link);
  L.push('');
  L.push('Feito com CrieConvites 🎊');

  window.open('https://wa.me/?text=' + encodeURIComponent(L.join('\n')), '_blank');
}
function openPublicInvite(){
  const slug = activeInvite?.slug;
  window.open(slug ? ('/'+slug) : 'convite.html','_blank');
}
function goEditor(){
  if(activeInvite){
    // Convite publicado não pode ser editado — é preciso deletar e criar um novo
    if(activeInvite.published){
      showToast('🔒 Convite publicado não pode ser editado. Exclua e crie um novo.');
      return;
    }
    // Editing existing invite — go straight to editor with the invite loaded
    localStorage.setItem('ccm_edit_invite', activeInvite.id);
    location.href='editor.html';
  } else {
    // No invite yet — go to template selector first
    location.href='templates.html';
  }
}
function newInvite(){
  // Limpa qualquer rascunho ou convite anterior antes de começar do zero
  ['ccm_current_slug','ccm_current_invite','ccm_draft','ccm_edit_invite','ccm_template'].forEach(k=>localStorage.removeItem(k));
  location.href='templates.html';
}
async function doLogout(){
  await sb.auth.signOut();
  // Limpa qualquer cache de convite/draft do usuário que está saindo para evitar
  // que o próximo login na mesma máquina veja dados da conta anterior.
  ['ccm_current_slug','ccm_current_invite','ccm_draft','ccm_edit_invite','ccm_template','ccm_last_user_id']
    .forEach(k => localStorage.removeItem(k));
  location.href='convite-online.html';
}
function exportCSV(){
  if(!guests.length){showToast('Nenhum convidado para exportar');return;}
  const header='Nome,WhatsApp,Acompanhantes,Status,Mensagem,Data';
  const rows=guests.map(g=>`"${g.name}","${g.phone||''}",${(g.plus_ones||0)+1},"${g.attending}","${g.message||''}","${g.created_at||''}"`);
  const csv=[header,...rows].join('\n');
  const a=document.createElement('a');
  a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv);
  a.download='convidados.csv';a.click();
  showToast('⬇️ CSV exportado!');
}
function showToast(msg){
  const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  clearTimeout(window._tt);window._tt=setTimeout(()=>t.classList.remove('show'),2800);
}
function timeAgo(iso){
  if(!iso)return'—';
  const s=Math.floor((Date.now()-new Date(iso))/1000);
  if(s<60)return'agora mesmo';if(s<3600)return Math.floor(s/60)+'min atrás';
  if(s<86400)return Math.floor(s/3600)+'h atrás';return Math.floor(s/86400)+'d atrás';
}

// ── CONFETE (celebra novas confirmações) ──
function fireConfetti(){
  if(window.matchMedia && matchMedia('(prefers-reduced-motion: reduce)').matches) return;
  const cv = document.getElementById('confettiCanvas');
  if(!cv) return;
  const ctx = cv.getContext('2d');
  cv.width = innerWidth; cv.height = innerHeight;
  const colors = ['#FF3D6B','#FFD93D','#34D399','#60A5FA','#F472B6'];
  const parts = Array.from({length:130},()=>({
    x: Math.random()*cv.width,
    y: -20 - Math.random()*cv.height*0.35,
    r: 4 + Math.random()*5,
    c: colors[Math.floor(Math.random()*colors.length)],
    vy: 2.2 + Math.random()*3.4,
    vx: -1.5 + Math.random()*3,
    rot: Math.random()*Math.PI,
    vr: -0.1 + Math.random()*0.2
  }));
  let frames = 0;
  cancelAnimationFrame(window._cfRaf);
  (function loop(){
    ctx.clearRect(0,0,cv.width,cv.height);
    for(const p of parts){
      p.y += p.vy; p.x += p.vx + Math.sin((frames+p.r)*0.06); p.rot += p.vr;
      ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.rot);
      ctx.fillStyle = p.c; ctx.fillRect(-p.r/2,-p.r/2,p.r,p.r*1.6);
      ctx.restore();
    }
    frames++;
    if(frames < 260 && parts.some(p=>p.y < cv.height+20)) window._cfRaf = requestAnimationFrame(loop);
    else ctx.clearRect(0,0,cv.width,cv.height);
  })();
}
